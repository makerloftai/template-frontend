name: Update lockfile

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - '.npmrc'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-lockfile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # `npm install` (not `ci`) is intentional - `ci` requires the lockfile
      # to already match package.json, which is exactly the state we're fixing.
      # --package-lock-only skips node_modules entirely.
      - name: Regenerate lockfile
        run: npm install --ignore-scripts --package-lock-only

      - name: Commit if changed
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "Lockfile already in sync."
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json
          git commit -m 'chore: update package-lock.json'
          git push
