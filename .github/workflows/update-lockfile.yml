name: Update lockfile

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - '.npmrc'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-lockfile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip on the very first push to a new ref. For generated user
    # apps that's the template-applied initial commit; the bot's
    # auto-commit would otherwise land before
    # CreateGithubRepoFromTemplate has a chance to delete this
    # workflow, and the chain verifier would flag it as a direct
    # push and pause the preview. Human dep bumps on the template
    # repos themselves are pushes to an existing main, so
    # created==false and the job runs.
    if: ${{ github.event.created != true }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # `npm install` (not `ci`) is intentional - `ci` requires the lockfile
      # to already match package.json, which is exactly the state we're fixing.
      # --package-lock-only skips node_modules entirely.
      - name: Regenerate lockfile
        run: npm install --ignore-scripts --package-lock-only

      - name: Commit if changed
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "Lockfile already in sync."
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json
          git commit -m 'chore: update package-lock.json'
          # Retry on race with concurrent pushes (e.g. scaffolding follow-up commits
          # landing while npm install is still running).
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected; rebasing onto latest origin/main and retrying."
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort
              echo "Rebase conflict on package-lock.json — another commit updated it. Skipping."
              exit 0
            fi
          done
          echo "Push failed after 3 attempts."
          exit 1
